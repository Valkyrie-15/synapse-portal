version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse_secret
      POSTGRES_DB: synapse_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synapse_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://synapse:synapse_secret@postgres:5432/synapse_portal
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
